<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg px-8 py-10">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <span class="text-2xl font-black lowercase tracking-wide">kamisita</span>
      <span class="text-[10px] font-light lowercase tracking-widest text-gray-400">everyday essentials</span>
    </div>

    <!-- Title -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-black mb-1">Hello Again!</h1>
      <p class="text-gray-400 text-sm">Welcome back you've been missed!</p>
    </div>

    <!-- Form -->
    <div class="flex flex-col gap-4">

      <!-- Email -->
      <input
        type="email"
        placeholder="Email"
        class="w-full bg-gray-100 rounded-xl px-4 py-4 text-sm outline-none focus:ring-2 focus:ring-black transition"
        [value]="email()"
        (input)="email.set($any($event.target).value)">

      <!-- Password -->
      <div class="relative">
        <input
          [type]="showPassword() ? 'text' : 'password'"
          placeholder="Password"
          class="w-full bg-gray-100 rounded-xl px-4 py-4 text-sm outline-none focus:ring-2 focus:ring-black transition pr-12"
          [value]="password()"
          (input)="password.set($any($event.target).value)">
        <button
          (click)="togglePassword()"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-black cursor-pointer text-sm">
          {{ showPassword() ? '👁' : '🙈' }}
        </button>
      </div>

      <!-- Recovery -->
      <div class="flex justify-end">
        <a class="text-xs text-gray-400 hover:text-black cursor-pointer">Recovery Password</a>
      </div>

      <!-- Sign In -->
      <button
        (click)="signIn()"
        class="w-full bg-black text-white py-4 rounded-xl font-semibold hover:bg-gray-800 transition cursor-pointer mt-2">
        Sign In
      </button>

    </div>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-6">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-xs text-gray-400">Or Continue With</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <!-- Social Login -->
    <div class="flex justify-center gap-4">
      <button class="w-14 h-14 border border-gray-200 rounded-xl flex items-center justify-center hover:bg-gray-50 transition cursor-pointer text-xl">
        G
      </button>
      <button class="w-14 h-14 border border-gray-200 rounded-xl flex items-center justify-center hover:bg-gray-50 transition cursor-pointer text-xl">
        f
      </button>
      <button class="w-14 h-14 border border-gray-200 rounded-xl flex items-center justify-center hover:bg-gray-50 transition cursor-pointer text-xl">
        🍎
      </button>
    </div>

    <!-- Register -->
    <p class="text-center text-xs text-gray-400 mt-6">
      Don't have an account?
      <a class="text-black font-semibold cursor-pointer hover:underline">Register</a>
    </p>

  </div>
</div>
