<section class="grid grid-cols-1 md:grid-cols-3 min-h-[90vh] bg-gray-100 gap-0">

  <!-- LEFT MODEL -->
  <div class="relative overflow-hidden h-64 md:h-auto animate-slide-left">
    <img src="women.jpg" alt="women model"
         class="w-full h-full object-cover object-top">
  </div>

  <!-- CENTER TEXT -->
  <div class="flex flex-col bg-white animate-fade-up">
    <div class="flex flex-col items-center justify-center text-center px-8 py-12 flex-1">
      <h1 class="text-3xl md:text-5xl font-black leading-tight mb-6">
        The Latest<br>in Streetwear<br>Fashion
      </h1>
      <p class="text-gray-500 mb-8 text-sm md:text-base">
        This is a space to welcome visitors to your site.
      </p>
     <button 
  (click)="goToProducts()"
  class="bg-green-600 text-white px-8 py-3 rounded-full font-semibold hover:bg-green-700 transition text-sm cursor-pointer">
  Shop Now
</button>
    </div>
    <div class="flex-1 w-full min-h-[200px]">
      <img src="womens.jpg" alt="Featured"
           class="w-full h-full object-cover object-top block">
    </div>
  </div>

  <!-- RIGHT MODEL (hidden on mobile) -->
  <div class="relative overflow-hidden hidden md:block animate-slide-right">
    <img src="men.jpg" alt="Men model"
         class="w-full h-full object-cover object-top">
  </div>

</section>
