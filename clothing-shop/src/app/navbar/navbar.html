<nav class="fixed top-0 left-0 right-0 z-50 bg-black-400 px-6 py-3 flex items-center justify-between transition-transform duration-300"
     [class.translate-y-0]="isVisible()"
     [class.-translate-y-full]="!isVisible()">

  <!-- LEFT -->
  <div class="flex gap-6 text-black font-medium">
    @for (link of navLinks; track link.value) {
      <a class="cursor-pointer hover:underline"
         (click)="setCategory(link.value)"
         [class.font-bold]="activeCategory() === link.value">
        {{ link.label }}
      </a>
    }
  </div>

  <!-- CENTER LOGO -->
<div class="absolute left-1/2 transform -translate-x-1/2 flex flex-col items-center leading-tight">
  <span class="text-xl font-black lowercase tracking-wide">kamisita</span>
  <span class="text-[10px] font-light lowercase tracking-widest">everyday essentials</span>
</div>
  <!-- RIGHT -->
  <div class="flex items-center gap-6">
    <div class="flex items-center gap-2 cursor-pointer">
      <span class="text-xl">👤</span>
      <span class="font-medium">Log In</span>
    </div>
    <div class="relative cursor-pointer text-xl">
      🛒
      <span class="absolute -top-2 -right-3 bg-black text-white text-xs px-2 py-[1px] rounded-full">
        {{ cartCount() }}
      </span>
    </div>
  </div>

</nav>

<!-- Spacer so content doesn't hide under fixed navbar -->
<div class="h-16"></div>
