<section class="grid grid-cols-1 md:grid-cols-3 min-h-[70vh]">

  <!-- LEFT MODEL -->
  <div #promoLeft class="animate-on-scroll relative overflow-hidden h-64 md:h-auto">
    <img src="p1.jpg" alt="Promo model"
         class="w-full h-full object-cover object-top">
  </div>

  <!-- CENTER TEXT -->
  <div #promoCenter class="animate-on-scroll flex flex-col items-center justify-center text-center bg-gray-100 px-8 py-16">
    <span class="text-4xl mb-4">🔥</span>
    <h2 class="text-4xl md:text-5xl font-black mb-4">25% OFF</h2>
    <p class="text-gray-500 mb-8 text-sm">25% off sitewide using TEES25 at checkout</p>
    <button 
  (click)="goToProducts()"
  class="bg-green-600 text-white px-8 py-3 rounded-full font-semibold hover:bg-green-700 transition cursor-pointer">
  Shop Now
</button>
  </div>

  <!-- RIGHT VIDEO -->
  <div #promoRight class="animate-on-scroll relative overflow-hidden h-64 md:h-auto">
    <video autoplay muted loop playsinline
           class="w-full h-full object-cover">
      <source src="vid.mp4" type="video/mp4">
    </video>
  </div>

</section>
