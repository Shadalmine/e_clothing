<section class="grid grid-cols-3 min-h-[70vh]">

  <div #promoLeft class="animate-on-scroll relative overflow-hidden">
    <img src="p1.jpg" alt="Promo model"
         class="w-full h-full object-cover object-top">
  </div>

  <div #promoCenter class="animate-on-scroll flex flex-col items-center justify-center text-center bg-gray-100 px-8">
    <span class="text-4xl mb-4">🔥</span>
    <h2 class="text-5xl font-black mb-4">25% OFF</h2>
    <p class="text-gray-500 mb-8">25% off sitewide using TEES25 at checkout</p>
    <button class="bg-green-600 text-white px-8 py-3 rounded-full font-semibold hover:bg-green-700 transition">
      Shop Now
    </button>
  </div>

  <div #promoRight class="animate-on-scroll relative overflow-hidden">
    <video autoplay muted loop playsinline
           class="w-full h-full object-cover">
      <source src="vid.mp4" type="video/mp4">
    </video>
  </div>

</section>
